<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>브레인 메모리 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>🧠 브레인 메모리 게임</h1>

    <section class="menu">
      <label>게임 모드</label>
      <select id="modeSelect">
        <option value="brain">🟢 치매 예방 모드</option>
        <option value="normal">🔵 일반 모드</option>
        <option value="speed">🔴 스피드 모드</option>
      </select>

      <div class="status">
        <div>⏱ 시간 <span id="time">90</span>초</div>
        <div>✅ 성공 <span id="score">0</span>/<span id="total">8</span></div>
        <div>🏆 최고 <span id="best">0</span></div>
      </div>

      <p id="guide">치매 예방 모드: 카드가 5초 동안 보인 뒤 시작돼용.</p>

      <button id="startBtn">게임 시작</button>
    </section>

    <div id="countdown"></div>

    <section id="gameBoard" class="board"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
